version: 1.1.0

errors:
    - name: ValveUnableToReachSetPoint
      severity: warning
      errno: EFAULT
      metadata:
          - name: ValveName
            type: object_path
            primary: true
            description: The name or identifier of the valve.
      redfish-mapping: Environmental.ValveUnableToReachSetPoint

events:
    - name: ValveOpen
      metadata:
          - name: ValveName
            type: object_path
            primary: true
            description: The name or identifier of the valve.
      en:
          description: The valve is open for coolant flow to resume.
          message: The {ValveName} is open for coolant flow.

    - name: ValveClose
      metadata:
          - name: ValveName
            type: object_path
            primary: true
            description: The name or identifier of the valve.
      en:
          description: The valve is closed for coolant flow to stop.
          message: The {ValveName} is closed for coolant flow.
