description: >
    Implement to provide network adapter attributes. A physical network adapter
    capable of connecting to a network. Examples include but are not limited to
    Ethernet NICs, converged network adapters, and embedded network controllers
    such as BMC direct-attach PHYs.

    This interface corresponds to the Redfish NetworkAdapter resource.
    Implementations that model a physical network adapter should expose this
    interface so that bmcweb can populate the Redfish NetworkAdapter collection.

associations:
    - name: connecting
      description: >
          Objects that implement NetworkAdapter can optionally implement the
          connecting association to provide links to one or more Ports.
      reverse_name: connected_to
      required_endpoint_interfaces:
          - xyz.openbmc_project.Inventory.Connector.Port

    - name: exposing
      description: >
          Objects that implement NetworkAdapter can optionally implement the
          exposing association to provide links to the logical network functions
          exposed by this physical network adapter.
      reverse_name: exposed_by
      required_endpoint_interfaces:
          - xyz.openbmc_project.Inventory.Item.NetworkInterface
