description: >
    Implement to provide network interface attributes.
properties:
    - name: MACAddress
      type: string
      description: >
          MAC address of the item
    - name: PermanentNodeGUID
      type: string
      description: >
          The permanent node GUID assigned to this network interface. Maps to
          InfiniBand.PermanentNodeGUID in the Redfish NetworkDeviceFunction
          schema.
    - name: PermanentPortGUID
      type: string
      description: >
          The permanent port GUID assigned to this network interface. Maps to
          InfiniBand.PermanentPortGUID in the Redfish NetworkDeviceFunction
          schema.

associations:
    - name: produced_by
      description: >
          Objects that implement NetworkInterface can optionally implement the
          produced_by association to provide a link back to a PCIe function.
      reverse_name: producing
      required_endpoint_interfaces:
          - xyz.openbmc_project.Inventory.Item.PCIeFunction

    - name: exposed_by
      description: >
          Objects that implement NetworkInterface can optionally implement the
          exposed_by association to provide a link back to the physical
          NetworkAdapter that exposes this logical network function.
      reverse_name: exposing
      required_endpoint_interfaces:
          - xyz.openbmc_project.Inventory.Item.NetworkAdapter

    - name: assigned_to
      description: >
          Objects that implement NetworkInterface can optionally implement the
          assigned_to association to list the physical port connectors on which
          this logical network function operates.
      reverse_name: assigning
      required_endpoint_interfaces:
          - xyz.openbmc_project.Inventory.Connector.Port
