description: >
    Implement to emit fan running-state transitions for fan tach sensors.

    Objects implementing Sensor.FanStatus must be instantiated in the correct
    hierarchy within the sensors namespace. The following sensor hierarchy is
    recognized:
      fan_tach

    Additionally, any object implementing Sensor.FanStatus must also implement
    Sensor.Value.

signals:
    - name: FanRunning
      description: >
          Emitted when fan running state changes.
      properties:
          - name: Running
            type: boolean
            description: >
                True when fan is running (RPM > 0), false otherwise.
