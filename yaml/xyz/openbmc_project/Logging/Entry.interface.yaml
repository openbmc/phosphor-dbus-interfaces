description: >
    Implement to provide event/error entry attributes. This interface should be
    instantiated for the phosphor::logging namespace. This interface is a
    collection of objects, therefore it is required to implement
    org.freedesktop.DBus.ObjectManager on the logging namespace root.
    Optionally, implement xyz.openbmc_project.Object.Delete to allow the
    deletion of individual entries.
properties:
    - name: Id
      type: uint32
      description: >
          The error event entry id number.
    - name: Timestamp
      type: uint64
      description: >
          Commit timestamp of the error event entry in milliseconds since 1970.
    - name: Severity
      type: enum[self.Level]
      description: >
          The severity of the error event entry.
    - name: Message
      type: string
      description: >
          The message description of the error event entry.
    - name: EventId
      type: string
      description: >
          An implementation-dependent unique identifier for this event. This
          property is different from Id in the sense that Id is a unique number
          per event but EventId is an optional identifier that is associated
          with the event. The content of this property is implementation
          defined.
    - name: AdditionalData
      type: dict[string, string]
      description: >
          Additional information in the form of metadata field strings {VAR,val}
    - name: Resolution
      type: string
      description: >
          Suggestion for error resolution of this event.
    - name: Resolved
      type: boolean
      description: >
          Error resolution status. Indicate if the problem being reported by
          this error log has been resolved. This will start out 'false' by
          default. Setting this to 'true' will NOT result in the error log being
          deleted.
      errors:
          - xyz.openbmc_project.Common.Error.Unavailable
    - name: ServiceProviderNotify
      type: enum[self.Notify]
      default: NotSupported
      description: >
          If this property value is set to 'Notify', the service provider must
          be notified about the Entry. If the value is set to 'Inhibit' then
          notification is not sent to the service provider. An event of this
          type requires a service action to correct the event, such as replacing
          the hardware part or updating code.
    - name: UpdateTimestamp
      type: uint64
      description: >
          The timestamp when any property was last modified, in milliseconds
          since the epoch (1 Jan 1970 00:00:00 UTC).  As only the Resolved
          property has a reason to change, a value that doesn't match the
          Timestamp property's value (which indicates when the log was created)
          would indicate that Resolved was changed.

    - name: Oem
      type: dict[string, dict[string, variant[string, uint64]]]
      default: {}
      description: >
          Container for vendor-specific extension data associated with the log
          entry.

          This property provides a structured and extensible mechanism for
          platform or vendor-defined metadata that is not represented by the
          standard Logging.Entry properties.

          The data is organized using a vendor-namespace model:

              {
                  "<Vendor>": {
                      "<Property>": <Value>
                  }
              }

          The first-level key denotes the vendor or implementation namespace,
          and the nested dictionary contains properties defined by that vendor.

          Design guidelines: - This property must only contain vendor-specific
          or derived metadata. - It must not duplicate or override standard
          Logging.Entry properties
            such as Message, Severity, Timestamp, or Id.
          - The structure and semantics of the contained data are defined
            by the originating vendor or platform.

          The logging service owns this property, including its storage and
          lifecycle as part of the log entry.

          OEM or platform-specific components may populate this property by
          contributing metadata through extension mechanisms (for example,
          registered callbacks invoked during log creation).

    - name: DiagnosticType
      type: enum[self.DiagnosticType]
      description: >
          Identifies the category of diagnostic information associated with this
          log entry.

          This property provides a hint to consumers on how any associated
          diagnostic data should be interpreted.

          This field is optional and may be absent for entries that do not carry
          diagnostic information.

    - name: DiagnosticInfo
      type: dict[string, variant[string, uint64, boolean]]
      default: {}
      description: >
          Structured diagnostic summary information associated with the log
          entry.

          This property is intended to carry a small set of key diagnostic
          attributes for quick inspection.

          For example, when DiagnosticType is CPER or CPERSection, this may
          include selected decoded fields such as section identifiers, severity
          indicators, or similar metadata.

          This property should remain lightweight. It is not intended to carry
          large or complete diagnostic payloads.

          Detailed or large diagnostic data (for example, full CPER records or
          binary content) should be referenced via AdditionalDataURI.

          This property complements AdditionalData by providing structured
          representation instead of flat key-value pairs.

    - name: AdditionalDataURI
      type: string
      description: >
          Optional URI referencing additional diagnostic data associated with
          this log entry.

          This may point to externally stored or large diagnostic content such
          as raw records or binary payloads managed outside the logging service.

          The logging service stores this reference but does not manage the
          lifecycle, availability, or validity of the referenced data.

          The ownership and lifecycle of the referenced data are the
          responsibility of the producing component.

          Consumers may use this URI to retrieve extended diagnostic information
          when supported.

enumerations:
    - name: Level
      description: >
          Possible severity levels for an error log entry.
      values:
          - name: Emergency
            description: >
                System is unusable.
          - name: Alert
            description: >
                Should be corrected immediately.
          - name: Critical
            description: >
                Critical condition.
          - name: Error
            description: >
                Error condition.
          - name: Warning
            description: >
                An error may occur if action is not taken.
          - name: Notice
            description: >
                Unusual condition, but not an error.
          - name: Informational
            description: >
                Normal operational message that does not require action.
          - name: Debug
            description: >
                Information useful to developers for debugging the application.

    - name: Notify
      description: >
          Possible ServiceProviderNotify values for an error log entry.
      values:
          - name: NotSupported
            description: >
                ServiceProviderNotify property is not supported.
          - name: Notify
            description: >
                The service provider should be notified about the event log.
          - name: Inhibit
            description: >
                The service provider should not be notified about the event log.

    - name: DiagnosticType
      description: >
          Supported diagnostic data categories that may be associated with log
          entries.
      values:
          - name: CPER
            description: >
                A complete Common Platform Error Record.

          - name: CPERSection
            description: >
                A section of a Common Platform Error Record.

methods:
    - name: GetEntry
      description: >
          Returns the file descriptor to the raw Entry file, which is a binary
          blob. The mode of the file descriptor is to be reaad-only.
      returns:
          - name: fd
            type: unixfd
            description: >
                The file descriptor to the Entry file.

service_names:
    - default: xyz.openbmc_project.Logging

paths:
    - namespace: /xyz/openbmc_project/logging
      segments:
          - name: Entry
            value: entry
