version: 1.1.0

errors:
    - name: FanFailed
      severity: critical
      metadata:
          - name: FanName
            description: The name or identifier of the fan.
            type: object_path
            primary: true
      errno: EIO
      redfish-mapping: Environmental.FanFailed

events:
    - name: FanRestored
      metadata:
          - name: FanName
            description: The name or identifier of the fan.
            type: object_path
            primary: true
      redfish-mapping: Environmental.FanRestored
    - name: FanRemoved
      metadata:
          - name: FanName
            description: The name or identifier of the fan.
            type: object_path
            primary: true
      redfish-mapping: Environmental.FanRemoved
    - name: FanInserted
      metadata:
          - name: FanName
            description: The name or identifier of the fan.
            type: object_path
            primary: true
      redfish-mapping: Environmental.FanInserted
