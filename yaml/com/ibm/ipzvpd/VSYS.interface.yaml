description: >
    Implement to represent the VSYS record in IPZ VPD
properties:
    - name: RT
      type: array[byte]
      description: >
          RT keyword. Contains the record name.
    - name: DR
      type: array[byte]
      description: >
          Description of the record.
    - name: BR
      type: array[byte]
      description: >
          The system brand.
    - name: SE
      type: array[byte]
      description: >
          System serial number - ipSeries.
    - name: SG
      type: array[byte]
      description: >
          System serial number - storage.
    - name: TM
      type: array[byte]
      description: >
          Machine type model - ipSeries.
    - name: TN
      type: array[byte]
      description: >
          Machine type model - storage.
    - name: MN
      type: array[byte]
      description: >
          Manufacturing ID.
    - name: ID
      type: array[byte]
      description: >
          Two character system ID.
    - name: SU
      type: array[byte]
      description: >
          System unique ID.
    - name: NN
      type: array[byte]
      description: >
          World wide node name.
    - name: RG
      type: array[byte]
      description: >
          Field core override.
    - name: RB
      type: array[byte]
      description: >
          RB keyword.
    - name: WN
      type: array[byte]
      description: >
          WWPN root.
    - name: FV
      type: array[byte]
      description: >
          Firmware version.
    - name: AA
      type: array[byte]
      description: >
          ACF Replay ID for BMCA.
    - name: AB
      type: array[byte]
      description: >
          ACF Replay ID for BMCB.
    - name: AK
      type: array[byte]
      description: >
          Access Key.
    - name: AT
      type: array[byte]
      description: >
          Asset Tag.
    - name: BA
      type: array[byte]
      description: >
          BIOS backup.
    - name: BN
      type: array[byte]
      description: >
          System brand name.
    - name: MM
      type: array[byte]
      description: >
          Memory mirror setting.
