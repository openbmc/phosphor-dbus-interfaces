version: "1.1.0"

description: >
    Events indicating that a Common Platform Error Record (CPER) has been
    generated or reported by a platform component.

    CPER represents platform-level error information generated by firmware or
    hardware components. The event may include structured diagnostic data
    derived from the CPER record, along with a reference to the originating
    component when available.

    The severity of the reported condition is determined from the RecordSeverity
    field contained within the associated diagnostic data.

    Implementations must ensure that the size of inline diagnostic data carried
    in this event remains bounded such that DBus payloads remain lightweight and
    efficiently consumable.

    The Data field must contain a meaningful and self-contained summary of the
    diagnostic condition sufficient for basic analysis without requiring access
    to external data.

    If the CPER diagnostic data is too large to be included inline,
    implementations should provide a reduced or summarized representation in the
    Data field.

    Full-fidelity diagnostic data may be provided via AdditionalDataURI when
    available.

    Implementations may omit AdditionalDataURI when no suitable mechanism exists
    to expose such data.

events:
    - name: CperDetected

      metadata:
          - name: Source
            type: object_path
            primary: true
            description: >
                The origin of the CPER event.

                This typically refers to a DBus inventory object representing
                the hardware component that reported or is associated with the
                error.

                This property can be used by higher-level services to correlate
                the event with inventory and FRU information for diagnostics and
                serviceability workflows.

          - name: Severity
            type: string
            description: >
                Severity of the CPER event.

                Typically derived from the CPER RecordSeverity field and mapped
                to logging severity levels.

          - name: AdditionalDataURI
            type: string
            description: >
                Optional reference to additional diagnostic data associated with
                the event.

                This should be used when the full CPER content cannot be
                included in the Data field.

                If provided, it SHOULD reference data exposed through a stable
                and well-defined interface.

                Implementations should prefer OpenBMC-managed objects (for
                example, dump entries under /xyz/openbmc_project/dump/entry/...)
                when making such data available.

                This field is intended only as an augmentation mechanism and
                MUST NOT be relied upon as the sole source of diagnostic
                information.

          - name: Type
            type: string
            primary: true
            description: >
                Identifies the type of diagnostic data associated with the
                event.

                Expected values include "CPER", "CPERSection", or "OEM".

                This value determines how the associated JSON diagnostic data
                should be interpreted by consumers and is consistent with the
                CPER diagnostic interface.

          - name: Data
            type: string
            primary: true
            description: >
                Structured diagnostic data associated with the CPER record.

                This field contains a decoded representation of the CPER content
                intended for lightweight consumption over DBus.

                The contents of this field must be size-bounded and suitable for
                efficient logging and transport.

                This may include the full decoded record or a reduced subset
                containing key diagnostic fields, depending on implementation
                constraints.

                Consumers must not assume that this field contains the complete
                decoded CPER content.

      en:
          description: CPER event reported.
          message: "CPER reported for {Source}"
