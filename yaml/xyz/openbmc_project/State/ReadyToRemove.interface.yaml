description: >
    Implement to indicate whether the item is prepared by the system for
    removal. Setting the value to true shall cause the service to perform
    appropriate actions to quiesce the item.
    Applications monitor this property and perform appropriate actions.
    After successful removal, the inventory object should be deleted or
    the Present property should be set to false.
    Setting ReadyToRemove=false cancels the removal preparation.
    If quiesce fails, property remains at previous value.
    Errors are communicated via D-Bus error responses.
    Applications should implement timeout and retry logic.
properties:
    - name: ReadyToRemove
      type: boolean
      default : false
      description: >
          Indicates whether the item is prepared by the system for removal.
          true - Item has been quiesced and is safe to remove.
          false - Item is in active use and should not be removed.
