description: >
    Implement to provide reset control for an inventory item. This differs from
    xyz.openbmc_project.State.Host, which manages host firmware power
    transitions, and from xyz.openbmc_project.Common.FactoryReset, which
    restores a service to its factory defaults. The 'controlling' association
    links a Control.Reset object to the inventory item being reset. The
    SupportedResetTypes property reports which reset types the device supports,
    and is mapped by bmcweb to the AllowableValues of the corresponding Redfish
    reset action.

methods:
    - name: Reset
      description: >
          Trigger a reset on the controlled device using the requested reset
          type.
      parameters:
          - name: Type
            type: enum[self.ResetTypes]
            description: >
                The reset type to perform. Must be one of the values reported in
                SupportedResetTypes.
      errors:
          - xyz.openbmc_project.Common.Error.NotAllowed
          - xyz.openbmc_project.Common.Error.Unavailable

properties:
    - name: SupportedResetTypes
      type: array[enum[self.ResetTypes]]
      flags:
          - readonly
      description: >
          The reset types supported by the controlled device, as reported by the
          device firmware. Maps to the values advertised in the Redfish action's
          ResetType@Redfish.AllowableValues. The first entry is treated as the
          default when the caller does not specify a type.

enumerations:
    - name: ResetTypes
      description: >
          Supported reset types. Each value corresponds to the same-named member
          of the Redfish Resource ResetType enumeration.
      values:
          - name: ForceRestart
            description: >
                Shut down the device immediately and non-gracefully and restart
                it.

associations:
    - name: controlling
      description: >
          Objects implementing Control.Reset must implement the 'controlling'
          association to provide a link to the inventory item that is being
          reset.
      reverse_name: controlled_by
      required_endpoint_interfaces:
          - xyz.openbmc_project.Inventory.Item
