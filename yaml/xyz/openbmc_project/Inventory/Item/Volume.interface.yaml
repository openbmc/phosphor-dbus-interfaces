description: >
    D-bus interface to manage a logical storage volume. Currently, this
    interface only supports LUKS encrypted volumes, but it can be extended in
    the future to support other types of volumes, as well.

methods:
    - name: FormatLuks
      description: >
          Format a LUKS encrypted device and create a filesystem.
      parameters:
          - name: Password
            type: array[byte]
            description: >
                Array of bytes to use as the LUKS password.
          - name: Type
            type: enum[self.FilesystemType]
            description: >
                Type of filesystem, e.g. ext2, ext3, ext4, vfat.
      errors:
          - xyz.openbmc_project.Common.Error.InternalFailure
          - xyz.openbmc_project.Common.Error.ResourceNotFound
          - xyz.openbmc_project.Common.Error.UnsupportedRequest

    - name: Erase
      description: >
          Erase the contents of the volume.
      parameters:
          - name: EraseType
            type: enum[self.EraseMethod]
            description: >
                Describes what type of erase is done.
      errors:
          - xyz.openbmc_project.Common.Error.InternalFailure
          - xyz.openbmc_project.Common.Error.ResourceNotFound

    - name: EraseBytes
      description: >
          Erase the specified byte range. This method only supports those erase
          methods where a byte range makes sense, namely LogicalOverWrite,
          LogicalVerify, ZeroOverWrite, and ZeroVerify. The other erase methods
          can only operate on the entire volume, and must be initiated with the
          other dbus method above.
      parameters:
          - name: EraseType
            type: enum[self.EraseMethod]
            description: >
                Describes what type of erase is done.
          - name: Offset
            type: uint64
            description: >
                The offset (in bytes) where the erase should start.
          - name: NumBytes
            type: uint64
            description: >
                The number of bytes to erase (starting at the specified offset).
      errors:
          - xyz.openbmc_project.Common.Error.InvalidArgument
      returns:
          - name: NumBytesErased
            type: uint64
            description: >
                The number of bytes that were erased. Note that if there was
                an error, this could be a smaller number than was indicated
                with the NumBytes input parameter.

    - name: Lock
      description: >
          Unmount the filesystem, lock the volume, and remove sensitive data
          (e.g. volume key) from memory.
      errors:
          - xyz.openbmc_project.Common.Error.InternalFailure
          - xyz.openbmc_project.Common.Error.UnsupportedRequest

    - name: Unlock
      description: >
          Activate the volume and mount the filesystem.
      parameters:
          - name: Password
            type: array[byte]
            description: >
                Array of bytes to use as the LUKS password.
      errors:
          - xyz.openbmc_project.Common.Error.InternalFailure
          - xyz.openbmc_project.Common.Error.ResourceNotFound

    - name: ChangePassword
      description: >
          Change the LUKS password that unlocks the storage volume.
      parameters:
          - name: OldPassword
            type: array[byte]
            description: >
                Array of bytes for the old LUKS password.
          - name: NewPassword
            type: array[byte]
            description: >
                Array of bytes to use as the LUKS password.
      errors:
          - xyz.openbmc_project.Common.Error.InternalFailure
          - xyz.openbmc_project.Common.Error.ResourceNotFound

properties:
    - name: Locked
      type: boolean
      default: false
      description: >
          Indicates whether the LUKS volume is locked.
    - name: Capacity
      default: 0
      type: uint64
      description: >
          The size in bytes of the Volume. `0` if cannot be determined.

enumerations:
    - name: EraseMethod
      description: >
          Indicates which erase method/step is being requested.
      values:
          - name: CryptoErase
            description: >
                Destroys the encryption key slots, preventing decyrption.
          - name: VerifyGeometry
            description: >
                Confirms a set percent of the disk is accessible.
          - name: LogicalOverWrite
            description: >
                Overwrites the disk with a reproducible incompressible pattern.
          - name: LogicalVerify
            description: >
                Verifies a reproducible pattern has been written to the disk.
          - name: VendorSanitize
            description: >
                Uses the sanitization provided by the device firmware.
          - name: ZeroOverWrite
            description: >
                Writes zeros over the whole disk.
          - name: ZeroVerify
            description: >
                Verifies the the entire disk has been zeroed.
          - name: SecuredLocked
            description: >
                Locks the disk to prevent data being written to it.

    - name: FilesystemType
      description: >
          Type of filesystem used on the storage device.
      values:
          - name: ext2
            description: >
                Filesystem type ext2
          - name: ext3
            description: >
                Filesystem type ext3
          - name: ext4
            description: >
                Filesystem type ext4
          - name: vfat
            description: >
                Filesystem type vfat
