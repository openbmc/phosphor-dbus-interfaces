version: "1.1.0"

description: >
    Events indicating that a Common Platform Error Record (CPER) has been
    generated or reported by a platform component.

    CPER represents platform-level error information generated by firmware or
    hardware components. The event may include structured diagnostic data
    derived from the CPER record, along with a reference to the originating
    component when available.

    The severity of the reported condition is determined from the RecordSeverity
    field contained within the associated diagnostic data.

    Implementations MUST ensure that the size of inline diagnostic data carried
    in this event remains bounded (recommended <= 4KB). Larger CPER payloads
    should be referenced via URI.

    Additional diagnostic data may be referenced via a URI. The lifecycle and
    availability of such data are managed by the producing component.

events:
    - name: CperDetected

      metadata:
          - name: Type
            type: string
            primary: true
            description: >
                Identifies the type of diagnostic data associated with the
                event.
                Expected values include "CPER" and "CPERSection".

          - name: Data
            type: string
            primary: true
            description: >
                Structured diagnostic data associated with the CPER record.

                This SHOULD be a size-bounded decoded representation of the
                CPER content (recommended <= 4KB).

                If the full decoded CPER exceeds this size, implementations
                SHOULD provide a reduced representation containing key
                diagnostic fields.

                This field does not require the complete CPER content and
                may represent either the full record or a subset of sections,
                depending on size and implementation constraints.

                Consumers should not assume that this field contains the
                complete decoded CPER.

          - name: Source
            type: object_path
            primary: true
            description: >
                The name or identifier of the CPER source.

          - name: Severity
            type: string
            description: >
                Severity of the CPER event.

                Typically derived from the CPER RecordSeverity field and
                mapped to logging severity levels.

          - name: AdditionalDataURI
            type: string
            description: >
                Optional URI referencing additional diagnostic data associated
                with the event.

                This SHOULD be used when the full CPER content exceeds
                the size constraints of the Data field.

      en:
          description: CPER event reported.
          message: "CPER reported for {Source}"
