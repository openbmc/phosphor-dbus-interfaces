version: "1.1.0"

description: >
    Events indicating that a Common Platform Error Record (CPER) has been
    generated or reported by a platform component.

    CPER represents platform-level error information generated by firmware or
    hardware components. The event may include structured diagnostic data
    derived from the CPER record, along with a reference to the originating
    component when available.

    The severity of the reported condition is determined from the RecordSeverity
    field contained within the associated diagnostic data.

    Implementations MUST ensure that the size of inline diagnostic data carried
    in this event remains bounded to keep DBus payloads lightweight and
    efficiently consumable.

    The specific size bound is implementation-defined. A recommended upper
    limit is approximately 4KB. Larger CPER payloads should be referenced via URI.

    Additional diagnostic data may be referenced via a URI. The lifecycle and
    availability of such data are managed by the producing component.

events:
  - name: CperDetected

    metadata:
      - name: Source
        type: object_path
        primary: true
        description: >
            The origin of the CPER event.

            This typically refers to a DBus inventory object representing
            the hardware component that reported or is associated with
            the error.

            This property can be used by higher-level services to correlate
            the event with inventory and FRU information for diagnostics
            and serviceability workflows.

      - name: Severity
        type: string
        description: >
            Severity of the CPER event.

            Typically derived from the CPER RecordSeverity field and
            mapped to logging severity levels.

      - name: AdditionalDataURI
        type: string
        description: >
            Optional URI referencing additional diagnostic data associated
            with the event.

            This SHOULD be used when the full CPER content exceeds the size
            constraints of the Data field.

            The URI may reference a DBus object (such as a dump entry),
            a file location, or a service endpoint exposing extended
            diagnostic data.

            This field is not tied to a specific hardware component,
            but serves as a generic mechanism to access full-fidelity
            diagnostic data.

      - name: Type
        type: string
        primary: true
        description: >
            Identifies the type of diagnostic data associated with the event.

            Expected values include "CPER" and "CPERSection".

      - name: Data
        type: string
        primary: true
        description: >
            Structured diagnostic data associated with the CPER record.

            This field contains a decoded, size-bounded representation of
            the CPER content intended for lightweight consumption over DBus.

            Depending on implementation constraints, this may include the full
            decoded record or a reduced subset containing key diagnostic fields.

            Consumers MUST NOT assume that this field contains the complete
            decoded CPER content.

    en:
      description: CPER event reported.
      message: "CPER reported for {Source}"
